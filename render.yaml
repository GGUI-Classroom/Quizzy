databases:
  - name: quizzy-db
    plan: free

services:
  - type: web
    name: quizzy
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TRUST_PROXY
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: quizzy-db
          property: connectionString
      # Optional: set this to your Render app URL to enforce WS origin checks.
      # - key: APP_ORIGIN
      #   value: https://quizzy.onrender.com
