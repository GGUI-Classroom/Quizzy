<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="/" class="brand">Quizzy</a>
      <nav class="top-actions">
        <a class="btn ghost" href="/play/">Join a game</a>
        <a class="btn ghost" href="/dashboard">Dashboard</a>
      </nav>
    </header>

    <main class="shell">
      <section class="hero card">
        <p class="badge">Quizzy</p>
        <h1>Separate pages. Real sets. Real game modes.</h1>
        <p class="muted">Create and host from the dashboard, and play from /play.</p>
        <div class="row gap wrap">
          <a href="/dashboard" class="btn primary">Go to Dashboard</a>
          <a href="/play/" class="btn secondary">Go to Player Screen</a>
        </div>
      </section>

      <section class="auth-grid">
        <form id="registerForm" class="card stack">
          <h2>Create account</h2>
          <label>Username <input id="registerUsername" maxlength="18" required /></label>
          <label>Password <input id="registerPassword" type="password" minlength="8" maxlength="128" required /></label>
          <button type="submit" class="btn primary">Sign up</button>
        </form>

        <form id="loginForm" class="card stack">
          <h2>Log in</h2>
          <label>Username <input id="loginUsername" maxlength="18" required /></label>
          <label>Password <input id="loginPassword" type="password" minlength="8" maxlength="128" required /></label>
          <button type="submit" class="btn secondary">Continue</button>
        </form>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
