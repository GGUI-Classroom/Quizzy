<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizFortress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Chakra+Petch:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="container">
      <header class="hero">
        <p class="pill">Server-authoritative • anti-cheat</p>
        <h1>QuizFortress</h1>
        <p>Fast classroom quiz battles inspired by Blooket, built to resist common DevTools exploits.</p>
      </header>

      <section id="authView" class="panel visible">
        <div class="split">
          <form id="hostForm" class="card">
            <h2>Host Game</h2>
            <label>
              Host Name
              <input id="hostName" maxlength="20" placeholder="GameMaster" required />
            </label>
            <button type="submit">Create Room</button>
          </form>

          <form id="joinForm" class="card">
            <h2>Join Game</h2>
            <label>
              Room Code
              <input id="joinCode" maxlength="6" placeholder="A2B4X9" required />
            </label>
            <label>
              Player Name
              <input id="playerName" maxlength="20" placeholder="PlayerOne" required />
            </label>
            <button type="submit">Join Room</button>
          </form>
        </div>
      </section>

      <section id="lobbyView" class="panel hidden">
        <div class="card wide">
          <div class="row between">
            <h2>Lobby</h2>
            <div class="room-pill">Code: <span id="roomCodeText">------</span></div>
          </div>
          <p id="hostStatus">Waiting for players...</p>
          <ul id="playerList" class="player-list"></ul>
          <div class="row gap">
            <button id="startBtn" class="hidden">Start Match</button>
            <button id="leaveBtn" class="ghost">Leave</button>
          </div>
        </div>
      </section>

      <section id="gameView" class="panel hidden">
        <div class="card wide">
          <div class="row between">
            <h2 id="qTitle">Question</h2>
            <div id="timer" class="timer">12.0s</div>
          </div>
          <p id="qPrompt" class="prompt"></p>
          <div id="options" class="options"></div>
          <div class="row gap top-space">
            <button id="doubleBtn" class="ghost">Activate 2x Powerup</button>
            <p id="roundFeedback"></p>
          </div>
        </div>
      </section>

      <section id="resultView" class="panel hidden">
        <div class="card wide">
          <h2>Leaderboard</h2>
          <ol id="leaderboard" class="leaderboard"></ol>
          <p id="winnerText"></p>
          <button id="backBtn">Back To Home</button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
